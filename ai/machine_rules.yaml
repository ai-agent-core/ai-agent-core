version: 1

agent_behavior:

  guessing: avoid
  hallucination: avoid
  hidden_assumptions: avoid

  escalation_required_when_uncertain: true
  request_clarification_if_ambiguous: true
  policy_precedence:
    higher_priority_policies_override: true

reasoning:

  prefer_architecture_over_speed: true
  prefer_safety_over_convenience: true
  prefer_clarity_over_cleverness: true
  prefer_simplicity_over_speculation: true

decision_constraints:

  violate_layers: avoid
  weaken_domain_boundaries: avoid
  introduce_hidden_coupling: avoid
  bypass_governance: avoid

execution_model:

  think_before_acting: mandatory
  follow_boot_sequence: mandatory
  surface_tradeoffs: mandatory
  avoid_local_optimization: mandatory

prime_directive:

  protect_architecture: absolute
