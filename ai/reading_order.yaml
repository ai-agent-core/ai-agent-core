version: 2

boot_sequence:

  - layer: ai_control
    priority: absolute
    files:
      - rules/AI_BEHAVIOR_RULES.md
      - ai/machine_rules.yaml
      - ai/decision_tree.yaml

  - layer: principles
    priority: foundational
    files:
      - principles/ENGINEERING_PRINCIPLES.md
      - principles/ARCHITECTURE_PRINCIPLES.md
      - principles/DESIGN_PHILOSOPHY.md
      - principles/FRONTEND_DESIGN_PHILOSOPHY.md
      - principles/SECURITY_PRINCIPLES.md
      - principles/OPERATIONAL_PRINCIPLES.md
      - principles/DATA_PRINCIPLES.md

  - layer: governance
    priority: constitutional
    files:
      - rules/META_RULES.md
      - rules/DECISION_RULES.md

  - layer: shared_language
    priority: mandatory
    files:
      - glossary/GLOSSARY.md

  - layer: structure
    priority: non_negotiable
    files:
      - rules/PROJECT_STRUCTURE_RULES.md
      - rules/PACKAGE_LAYOUT_COMMON_RULES.md
      - rules/PACKAGE_LAYOUT_BACKEND_RULES.md
      - rules/PACKAGE_LAYOUT_WORKERS_RULES.md
      - rules/PACKAGE_LAYOUT_FUNCTIONS_RULES.md
      - rules/PACKAGE_LAYOUT_FRONTEND_RULES.md
      - rules/GENERATOR_RULES.md
      - rules/STACK_DEFAULTS_RULES.md

  - layer: boundaries
    priority: critical
    files:
      - rules/LAYER_DEPENDENCY_RULES.md
      - rules/MAPPER_RULES.md

  - layer: execution_discipline
    priority: operational
    files:
      - rules/WORKFLOW_RULES.md
      - rules/TASK_MANAGEMENT_RULES.md

  - layer: implementation
    priority: disciplined
    files:
      - rules/NAMING_RULES.md
      - rules/CODING_RULES.md
      - rules/ERROR_HANDLING_RULES.md
      - rules/TESTING_RULES.md
      - rules/FRONTEND_DESIGN_RULES.md
      - rules/FRONTEND_DEMO_MODE_RULES.md

  - layer: cross_cutting
    priority: load_by_classification
    description: |
      Loaded only when the task classification (see
      ai/context_profiles.yaml) attaches the relevant tag. Listed
      here so the union is auditable.
    files:
      - rules/API_DESIGN_RULES.md
      - rules/DATABASE_RULES.md
      - rules/MIGRATION_RULES.md
      - rules/EVENT_RULES.md
      - rules/MONEY_HANDLING_RULES.md
      - rules/SECURITY_RULES.md
      - rules/AUTHENTICATION_RULES.md
      - rules/SECRETS_RULES.md
      - rules/OBSERVABILITY_RULES.md
      - rules/PERFORMANCE_RULES.md
      - rules/CICD_RULES.md
      - rules/INFRA_RULES.md
      - rules/RELEASE_RULES.md
      - rules/DEPENDENCY_RULES.md
      - rules/ACCESSIBILITY_RULES.md
      - rules/DOCUMENTATION_RULES.md
      - rules/NOTIFICATION_RULES.md

enforcement:

  skip_layers_forbidden: true
  improvisation_forbidden: true
  architecture_precedes_implementation: true
  policy_precedence:
    higher_priority_policies_override: true
