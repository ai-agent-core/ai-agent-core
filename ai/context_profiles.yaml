version: 2

# Context loading routing table.
#
# Agents classify the current task by assigning tags across the
# dimensions below. For every assigned tag, the corresponding
# contribution list is looked up. The union (deduplicated) of all
# contribution lists is the set of files to load beyond Core.
#
# When uncertain, prefer over-tagging. The dedupe makes it cheap.
# When classification itself fails, fall back to "fallback.load_all".

core:
  description: |
    Files that MUST be loaded for every task. Establish governance,
    architecture, language, and routing.
  files:
    - AGENTS.md
    - ai-agent-core/INDEX.md
    - ai-agent-core/principles/ENGINEERING_PRINCIPLES.md
    - ai-agent-core/principles/ARCHITECTURE_PRINCIPLES.md
    - ai-agent-core/principles/DESIGN_PHILOSOPHY.md
    - ai-agent-core/principles/SECURITY_PRINCIPLES.md
    - ai-agent-core/principles/OPERATIONAL_PRINCIPLES.md
    - ai-agent-core/principles/DATA_PRINCIPLES.md
    - ai-agent-core/rules/AI_BEHAVIOR_RULES.md
    - ai-agent-core/rules/META_RULES.md
    - ai-agent-core/rules/DECISION_RULES.md
    - ai-agent-core/rules/WORKFLOW_RULES.md
    - ai-agent-core/rules/TASK_MANAGEMENT_RULES.md
    - ai-agent-core/rules/STACK_DEFAULTS_RULES.md
    - ai-agent-core/glossary/GLOSSARY.md
    - ai-agent-core/ai/context_profiles.yaml

dimensions:

  activity:
    description: What kind of action the agent is performing.
    values:
      - implementation
      - structure_design
      - visual_design
      - bootstrap
      - review
      - migration
      - incident_response
      - release
      - audit

  stack:
    description: Which technology surface the work targets. Multiple allowed.
    values:
      - backend
      - functions
      - frontend
      - mobile
      - data
      - infra
      - cicd

  topic:
    description: Cross-cutting concerns that may attach. Zero or more.
    values:
      - aggregate_boundary
      - persistence
      - test_authoring
      - naming
      - error_handling
      - api_contract
      - security
      - authentication
      - secrets
      - observability
      - performance
      - caching
      - feature_flag
      - event_driven
      - money
      - payment
      - accessibility
      - documentation
      - dependency
      - schema_migration
      - legacy_migration
      - release
      - branching
      - notifications
      - email

