# Example task patterns — illustrative.
examples:

  backend_new_usecase:
    description: Backend で新しい UseCase を実装する
    tags:
      activity: implementation
      stack: [backend]

  backend_new_repository:
    description: Backend で Repository interface + Impl を追加する
    tags:
      activity: implementation
      stack: [backend]
      topic: [persistence]

  functions_new_function:
    description: 新しい Serverless Function を実装する
    tags:
      activity: implementation
      stack: [functions]

  frontend_new_page:
    description: Frontend で新しい Page を実装する
    tags:
      activity: implementation
      stack: [frontend]
      topic: [accessibility, performance]

  full_stack_new_feature:
    description: Backend と Frontend を同時に実装する
    tags:
      activity: implementation
      stack: [backend, frontend]
      topic: [api_contract, accessibility]

  aggregate_boundary_discussion:
    description: Aggregate 境界を指示者と詰める
    tags:
      activity: structure_design
      stack: [backend]
      topic: [aggregate_boundary]

  landing_page_design:
    description: LP のデザイン判断
    tags:
      activity: visual_design
      stack: [frontend]
      topic: [accessibility]

  new_project_bootstrap:
    description: 新規プロジェクトを初期化する
    tags:
      activity: bootstrap

  ui_review_for_ai_tropes:
    description: UI を AI 臭観点でレビューする
    tags:
      activity: review
      stack: [frontend]
      topic: [accessibility]

  backend_code_review:
    description: Backend のコードレビュー
    tags:
      activity: review
      stack: [backend]

  api_design_session:
    description: 公開 API を設計 / 変更する
    tags:
      activity: structure_design
      stack: [backend]
      topic: [api_contract, security]

  database_schema_change:
    description: DB スキーマ変更を計画 / 実行する
    tags:
      activity: migration
      stack: [data, backend]
      topic: [schema_migration]

  legacy_system_migration:
    description: 既存システムを段階的に置き換える
    tags:
      activity: migration
      stack: [backend, data, infra]
      topic: [legacy_migration]

  payment_integration:
    description: 決済プロバイダ統合
    tags:
      activity: implementation
      stack: [backend]
      topic: [payment, money, security, authentication, observability]

  cicd_setup:
    description: CI / CD パイプラインを構築 / 変更する
    tags:
      activity: structure_design
      stack: [cicd]
      topic: [release, dependency]

  infra_provisioning:
    description: 新環境 / 新リージョン / 新クラスタの構築
    tags:
      activity: structure_design
      stack: [infra]
      topic: [security, secrets, observability]

  observability_instrumentation:
    description: サービスを計装する (logs/metrics/traces)
    tags:
      activity: implementation
      stack: [backend]
      topic: [observability]

  security_baseline_audit:
    description: サービスのセキュリティベースラインを監査する
    tags:
      activity: audit
      stack: [backend]
      topic: [security, authentication, secrets, dependency]

  incident_response:
    description: 本番障害の対応中
    tags:
      activity: incident_response

  feature_release_rollout:
    description: 機能を段階リリースする
    tags:
      activity: release
      topic: [feature_flag, release]

  dependency_update:
    description: 依存パッケージを更新 / 監査する
    tags:
      activity: audit
      topic: [dependency, security]

  performance_audit:
    description: 性能予算を超過した surface を調整する
    tags:
      activity: audit
      topic: [performance]

  caching_introduction:
    description: 新しいキャッシュ層を追加する
    tags:
      activity: implementation
      stack: [backend]
      topic: [caching, performance, observability]

  event_pipeline_design:
    description: 非同期 / event-driven フローを設計する
    tags:
      activity: structure_design
      stack: [backend]
      topic: [event_driven, observability]

  authentication_change:
    description: 認証フローを変更する
    tags:
      activity: implementation
      stack: [backend]
      topic: [authentication, security, secrets]

  accessibility_audit:
    description: UI のアクセシビリティ監査
    tags:
      activity: audit
      stack: [frontend]
      topic: [accessibility]

  adr_writing:
    description: Architecture Decision Record を書く
    tags:
      activity: structure_design
      topic: [documentation]

