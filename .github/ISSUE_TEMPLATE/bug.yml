name: Bug report
description: Report a defect in bootstrap / migration scripts, routing, or governance content.
title: "bug: <one-line summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please give enough detail that someone else can
        reproduce the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: e.g. running migration.sh --apply on a clean tree creates an unexpected directory.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands and starting state.
      placeholder: |
        1. mkdir host && cd host
        2. cp -R ai-agent-core .
        3. bash ai-agent-core/init/bootstrap.sh
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (with relevant output)
      render: shell
  - type: input
    id: ai-agent-core-version
    attributes:
      label: AI Agent Core version / commit
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: AI agent / tool used (optional)
      placeholder: e.g. Claude Code 1.x, Cursor 0.x, Copilot, none
