name: smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  bootstrap:
    name: bootstrap.sh installs cleanly
    runs-on: ubuntu-latest
    steps:
      - name: Check out ai-agent-core
        uses: actions/checkout@v4
        with:
          path: ai-agent-core-src

      - name: Run bootstrap into an isolated host directory
        run: |
          set -euo pipefail
          mkdir -p host-project
          cp -R ai-agent-core-src host-project/ai-agent-core
          rm -rf host-project/ai-agent-core/generated
          cd host-project
          bash ai-agent-core/init/bootstrap.sh

      - name: Verify host root contains only entrypoints
        run: |
          set -euo pipefail
          cd host-project
          test -f AGENTS.md
          test -f CLAUDE.md
          test ! -d tasks
          test ! -d agent-works
          test ! -d agent-spec

      - name: Verify runtime state landed in ai-agent-core/generated/tasks/
        run: |
          set -euo pipefail
          cd host-project
          test -f ai-agent-core/generated/tasks/todo.md
          test -f ai-agent-core/generated/tasks/lessons.md

      - name: Verify second bootstrap aborts (idempotency guard)
        run: |
          set -euo pipefail
          cd host-project
          if bash ai-agent-core/init/bootstrap.sh ; then
            echo "FAIL: second run should have aborted"
            exit 1
          fi
          echo "OK: second run aborted as expected"

  migration:
    name: migration.sh handles legacy state
    runs-on: ubuntu-latest
    steps:
      - name: Check out ai-agent-core
        uses: actions/checkout@v4
        with:
          path: ai-agent-core-src

      - name: Build a host project with legacy artifacts
        run: |
          set -euo pipefail
          mkdir -p host-project
          cp -R ai-agent-core-src host-project/ai-agent-core
          rm -rf host-project/ai-agent-core/generated
          cd host-project
          mkdir -p tasks agent-works agent-spec agent-input
          echo "USER_TODO_CONTENT" > tasks/todo.md
          echo "USER_LESSONS"      > tasks/lessons.md
          echo "old work note"     > agent-works/note-2024.md
          echo "OLD WORK STATE"    > agent-spec/WORK_STATE.md
          echo "user added rule"   > agent-spec/extra-user-file.md
          echo "input sample"      > agent-input/sample.txt
          printf '.idea\n' > .gitignore
          printf '# OLD\n\n---\nGenerated by ai-agent-core v0.9.0\n' > AGENTS.md
          printf '# CUSTOM CLAUDE.md\n' > CLAUDE.md

      - name: Dry run leaves the tree unchanged
        run: |
          set -euo pipefail
          cd host-project
          bash ai-agent-core/init/migration.sh
          test -f tasks/todo.md
          test -f agent-works/note-2024.md
          test -f agent-spec/WORK_STATE.md
          test -f agent-input/sample.txt

      - name: Apply migrates user content and removes provided shells
        run: |
          set -euo pipefail
          cd host-project
          bash ai-agent-core/init/migration.sh --apply

          test -f ai-agent-core/generated/tasks/todo.md
          test "$(cat ai-agent-core/generated/tasks/todo.md)" = "USER_TODO_CONTENT"

          test -f ai-agent-core/generated/tasks/lessons.md
          test "$(cat ai-agent-core/generated/tasks/lessons.md)" = "USER_LESSONS"

          test -f ai-agent-core/generated/tasks/legacy-work-state.md
          test "$(cat ai-agent-core/generated/tasks/legacy-work-state.md)" = "OLD WORK STATE"

          test -f ai-agent-core/generated/tasks/legacy-agent-works/note-2024.md
          test -f ai-agent-core/generated/inputs/sample.txt

          test ! -d tasks
          test ! -d agent-works
          test ! -d agent-spec
          test ! -d agent-input

          ls ai-agent-core/generated/migration-backup-*/agent-spec/extra-user-file.md
          grep -q 'ai-agent-core/generated/' .gitignore

      - name: AGENTS.md refreshed from scaffold (marker triggers refresh)
        run: |
          set -euo pipefail
          cd host-project
          # The seeded AGENTS.md had the marker but a stale body. After
          # migration --apply, it must match the current scaffold body
          # and carry the latest stamp.
          grep -q '^# Agent Entrypoint' AGENTS.md
          grep -q '^Generated by ai-agent-core v' AGENTS.md
          # And the previous version must be in the backup.
          ls ai-agent-core/generated/migration-backup-*/AGENTS.md

      - name: CLAUDE.md without marker is preserved (user-authored)
        run: |
          set -euo pipefail
          cd host-project
          # The seeded CLAUDE.md had no marker, so migration must NOT
          # overwrite it.
          grep -q '^# CUSTOM CLAUDE.md' CLAUDE.md

      - name: Re-running is a no-op (idempotency)
        run: |
          set -euo pipefail
          cd host-project
          bash ai-agent-core/init/migration.sh | tee /tmp/out
          grep -q 'No migration actions required.' /tmp/out

      - name: --keep-entrypoints suppresses entrypoint refresh
        run: |
          set -euo pipefail
          # Build a fresh tmp host with stale-marker AGENTS.md.
          tmp=$(mktemp -d)
          mkdir -p "$tmp/host"
          cp -R ai-agent-core-src "$tmp/host/ai-agent-core"
          rm -rf "$tmp/host/ai-agent-core/generated"
          cd "$tmp/host"
          printf '# OLD STALE\n\n---\nGenerated by ai-agent-core v0.9.0\n' > AGENTS.md
          printf '# stale claude\n\n---\nGenerated by ai-agent-core v0.9.0\n' > CLAUDE.md
          bash ai-agent-core/init/migration.sh --apply --keep-entrypoints
          # Body must NOT have been replaced from scaffold.
          grep -q '^# OLD STALE' AGENTS.md
          grep -q '^# stale claude' CLAUDE.md

  references:
    name: routing references resolve to existing files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every file referenced from context_profiles.yaml exists
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r ref ; do
            rel="${ref#ai-agent-core/}"
            if [[ ! -e "$rel" ]]; then
              echo "MISSING: $ref"
              missing=$((missing+1))
            fi
          done < <(grep -oE 'ai-agent-core/[a-zA-Z0-9_./-]+\.(md|yaml)' ai/context_profiles.yaml | sort -u)
          if [[ $missing -gt 0 ]]; then
            echo "Found $missing missing references."
            exit 1
          fi
          echo "All references resolve."

      - name: Verify every skill directory has SKILL.md
        run: |
          set -euo pipefail
          missing=0
          for d in skills/*/ ; do
            [[ "$d" = "skills/README.md/" ]] && continue
            if [[ ! -f "${d}SKILL.md" ]]; then
              echo "MISSING SKILL.md in $d"
              missing=$((missing+1))
            fi
          done
          if [[ $missing -gt 0 ]]; then exit 1; fi
          echo "All skills have SKILL.md."

      - name: Verify every SKILL.md has required frontmatter keys
        run: |
          set -euo pipefail
          fail=0
          for f in skills/*/SKILL.md ; do
            head -1 "$f" | grep -q '^---$' || { echo "no opening --- in $f"; fail=1; }
            head -10 "$f" | grep -q '^name:' || { echo "no name: in $f"; fail=1; }
            head -10 "$f" | grep -q '^description:' || { echo "no description: in $f"; fail=1; }
          done
          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "All SKILL.md frontmatter looks well-formed."
